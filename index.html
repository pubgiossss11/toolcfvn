<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>T2K STORE</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
body{
background:#050816;
background-image:url('https://images.unsplash.com/photo-1511512578047-dfb367046420?q=80&w=1200');
background-size:cover;
background-attachment:fixed;
color:white;
}
header{
background:#111;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:2px solid #222;
}
.logo{
font-size:30px;
font-weight:bold;
color:#ffd54f;
}
.container{
padding:20px;
max-width:700px;
margin:auto;
}
.card{
background:rgba(0,0,0,.75);
border-radius:12px;
overflow:hidden;
margin-bottom:25px;
box-shadow:0 0 20px rgba(0,0,0,.5);
}
.banner{
width:100%;
height:230px;
object-fit:cover;
}
.content{
padding:20px;
}
.title{
font-size:35px;
margin-bottom:15px;
}
.line{
height:2px;
background:#444;
margin-bottom:20px;
}
select{
width:100%;
padding:15px;
font-size:20px;
margin-bottom:15px;
}
.buy-btn{
width:100%;
padding:15px;
background:#ff9800;
border:none;
font-size:25px;
color:white;
cursor:pointer;
}
.popup{
position:fixed;
inset:0;
background:rgba(0,0,0,.8);
display:none;
justify-content:center;
align-items:center;
}
.popup-box{
background:#111827;
padding:25px;
width:90%;
max-width:400px;
border-radius:15px;
}
.popup-box h2{
margin-bottom:20px;
}
.popup-box input{
width:100%;
padding:14px;
margin-bottom:15px;
font-size:18px;
}
.confirm-btn{
width:100%;
padding:15px;
background:#2979ff;
border:none;
font-size:20px;
color:white;
cursor:pointer;
}
.close{
margin-top:15px;
text-align:center;
color:#aaa;
cursor:pointer;
}
.note{
margin-top:20px;
font-size:14px;
color:#bbb;
line-height:1.6;
}
</style>
</head>
<body>

<header>
<div class="logo">T2K STORE</div>
<div>☰</div>
</header>

<div class="container">

<div class="card">

<img class="banner"
src="https://images.unsplash.com/photo-1542751371-adc38448a05e?q=80&w=1200">

<div class="content">

<div class="title">
HACK CFVN TUYỆT ĐỐI AN TOÀN DÀNH CHO STREM
</div>

<div class="line"></div>

<select id="packageSelect">

<option>
--- Chọn gói ---
</option>

<option>
700.000đ / 7 Ngày
</option>

<option>
2000.000đ / 30 Ngày
</option>

<option>
5000.000đ / 1 năm
</option>

</select>

<button class="buy-btn" id="buyBtn">
Thuê ngay
</button>

<div class="note">
Sau khi thuê hệ thống sẽ gửi thông báo về Telegram admin.
</div>

</div>
</div>
</div>

<div class="popup" id="popup">

<div class="popup-box">

<h2>CHECKOUT</h2>

<input type="text" id="customerName" placeholder="Tên khách">

<input type="text" id="gameUID" placeholder=" SDT HOẶC GMAIL ĐỂ LIÊN HỆ CÀI HACK ">

<button class="confirm-btn" id="confirmBtn">
XÁC NHẬN
</button>

<div class="close" id="closePopup">
Đóng
</div>

</div>
</div>

<script>

/* =========================
   DÁN TOKEN TẠI ĐÂY
========================= */

const BOT_TOKEN =
"8286513067:AAFnqX5GmZCt1StrcUOeQwiMpZyS5XnvBqA";

const CHAT_ID =
"1666813070";

/* ========================= */

const popup =
document.getElementById('popup');

const buyBtn =
document.getElementById('buyBtn');

const confirmBtn =
document.getElementById('confirmBtn');

const closePopup =
document.getElementById('closePopup');

const packageSelect =
document.getElementById('packageSelect');

buyBtn.addEventListener('click', ()=>{

if(packageSelect.selectedIndex === 0){

alert('Vui lòng chọn gói');

return;

}

popup.style.display='flex';

});

closePopup.addEventListener('click', ()=>{

popup.style.display='none';

});

confirmBtn.addEventListener('click', async()=>{

const name =
document.getElementById('customerName').value;

const uid =
document.getElementById('gameUID').value;

if(!name || !uid){

alert('Vui lòng nhập đầy đủ');

return;

}

const key =
'T2K-' +
Math.random()
.toString(36)
.substring(2,10)
.toUpperCase();

const orderID =
'#' +
Math.floor(Math.random()*999999);

const message = `
🛒 ĐƠN HÀNG MỚI

👤 Tên:
${name}

🎮 UID:
${uid}

📦 Gói:
${packageSelect.value}

🔑 KEY:
${key}

🆔 ORDER:
${orderID}

🕒 TIME:
${new Date().toLocaleString()}
`;

try{

await fetch(
`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`,
{
method:'POST',
headers:{
'Content-Type':'application/json'
},
body:JSON.stringify({
chat_id:CHAT_ID,
text:message
})
}
);

alert(
'THUÊ THÀNH CÔNG AD SẼ NHẮN CHO BẠN HÃY ĐỂ Ý TIN NHẮN  + key
);

popup.style.display='none';

}catch(err){

alert('Lỗi Telegram');

console.log(err);

}

});

</script>

</body>
</html>
