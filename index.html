<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HACK CFVN STORE</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#050816;
background-image:url('https://images.unsplash.com/photo-1511512578047-dfb367046420?q=80&w=1200');
background-size:cover;
background-attachment:fixed;
color:white;
}

header{
background:#111;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:2px solid #222;
position:sticky;
top:0;
z-index:999;
}

.logo{
font-size:32px;
font-weight:bold;
color:#ffd54f;
}

.menu{
font-size:30px;
cursor:pointer;
}

.container{
padding:20px;
max-width:700px;
margin:auto;
}

.card{
background:rgba(0,0,0,.75);
border-radius:12px;
overflow:hidden;
margin-bottom:30px;
box-shadow:0 0 20px rgba(0,0,0,.5);
border:1px solid #222;
}

.banner{
width:100%;
height:230px;
object-fit:cover;
}

.content{
padding:20px;
}

.title{
font-size:40px;
margin-bottom:15px;
text-transform:uppercase;
}

.line{
height:2px;
background:#444;
margin-bottom:20px;
}

.note{
margin-bottom:20px;
color:#bbb;
line-height:1.6;
font-size:15px;
}

.package-select{
width:100%;
padding:18px;
font-size:22px;
margin-bottom:15px;
background:#eee;
border:none;
outline:none;
}

.buy-btn{
width:100%;
padding:18px;
background:#ff9800;
border:none;
font-size:28px;
color:white;
cursor:pointer;
transition:.2s;
}

.buy-btn:hover{
background:#ffb74d;
}

.download{
width:100%;
padding:15px;
background:white;
border:none;
font-size:20px;
margin-top:15px;
cursor:pointer;
}

/* POPUP */

.popup{
position:fixed;
inset:0;
background:rgba(0,0,0,.8);
display:none;
justify-content:center;
align-items:center;
z-index:9999;
}

.popup-box{
background:#111827;
width:90%;
max-width:450px;
padding:25px;
border-radius:15px;
}

.popup-box h2{
margin-bottom:20px;
font-size:35px;
}

.popup-box input{
width:100%;
padding:15px;
margin-bottom:15px;
border:none;
border-radius:10px;
font-size:18px;
}

.confirm-btn{
width:100%;
padding:16px;
background:#2979ff;
border:none;
font-size:24px;
color:white;
cursor:pointer;
border-radius:10px;
}

.close{
margin-top:15px;
text-align:center;
cursor:pointer;
color:#aaa;
}

/* MOBILE */

@media(max-width:768px){

.title{
font-size:28px;
}

.package-select{
font-size:18px;
}

.buy-btn{
font-size:22px;
}

.banner{
height:180px;
}

}

</style>
</head>

<body>

<header>

<div class="logo">
T2K STORE
</div>

<div class="menu">
☰
</div>

</header>

<div class="container">

<!-- FULL -->

<div class="card">

<img
class="banner"
src="https://images.unsplash.com/photo-1542751371-adc38448a05e?q=80&w=1200"
>

<div class="content">

<div class="title">
FULL VIP
</div>

<div class="line"></div>

<div class="note">
AIM + WALL + BUNNY + STREAM SAFE
</div>

<select class="package-select">

<option>
--- Chọn gói ---
</option>

<option>
700.000đ / 7 Ngày
</option>

<option>
2.000.000đ / 30 Ngày
</option>

<option>
5.000.000đ / 1 Năm
</option>

</select>

<button class="buy-btn">
Thuê ngay
</button>

<button class="download">
📹 HƯỚNG DẪN SỬ DỤNG
</button>

</div>
</div>

<!-- LITE -->

<div class="card">

<img
class="banner"
src="https://images.unsplash.com/photo-1511882150382-421056c89033?q=80&w=1200"
>

<div class="content">

<div class="title">
BẢN LITE
</div>

<div class="line"></div>

<div class="note">
CHỈ AIM - NHẸ - ỔN ĐỊNH
</div>

<select class="package-select">

<option>
--- Chọn gói ---
</option>

<option>
40.000đ / 1 Ngày
</option>

<option>
240.000đ / 7 Ngày
</option>

<option>
540.000đ / 30 Ngày
</option>

</select>

<button class="buy-btn">
Thuê ngay
</button>

<button class="download">
📹 HƯỚNG DẪN SỬ DỤNG
</button>

</div>
</div>

<!-- WALL -->

<div class="card">

<img
class="banner"
src="https://images.unsplash.com/photo-1550745165-9bc0b252726f?q=80&w=1200"
>

<div class="content">

<div class="title">
BẢN WALL
</div>

<div class="line"></div>

<div class="note">
CHỈ WALL - AN TOÀN - STREAM SAFE
</div>

<select class="package-select">

<option>
--- Chọn gói ---
</option>

<option>
40.000đ / 1 Ngày
</option>

<option>
240.000đ / 7 Ngày
</option>

<option>
540.000đ / 30 Ngày
</option>

</select>

<button class="buy-btn">
Thuê ngay
</button>

<button class="download">
📹 HƯỚNG DẪN SỬ DỤNG
</button>

</div>
</div>

</div>

<!-- POPUP -->

<div class="popup" id="popup">

<div class="popup-box">

<h2>CHECKOUT</h2>

<input
type="text"
id="customerName"
placeholder="Tên khách"
>

<input
type="text"
id="gameUID"
placeholder="SDT HOẶC GMAIL ĐỂ LIÊN HỆ"
>

<button
class="confirm-btn"
id="confirmBtn"
>
XÁC NHẬN
</button>

<div
class="close"
id="closePopup"
>
Đóng
</div>

</div>

</div>

<script>

/* =========================
   TELEGRAM CONFIG
========================= */
const BOT_TOKEN = "8286513067:AAFnqX5GmZCt1StrcUOeQwiMpZyS5XnvBqA";
const CHAT_ID = "1666813070";

/* ========================= */

const popup =
document.getElementById('popup');

const confirmBtn =
document.getElementById('confirmBtn');

const closePopup =
document.getElementById('closePopup');

let currentTitle = "";
let currentPackage = "";

/* =====================
   OPEN POPUP
===================== */

document.querySelectorAll('.buy-btn')
.forEach(btn=>{

btn.addEventListener('click', ()=>{

const card =
btn.closest('.card');

const title =
card.querySelector('.title').innerText;

const select =
card.querySelector('.package-select');

if(select.selectedIndex === 0){

alert('Vui lòng chọn gói');

return;

}

currentTitle = title;

currentPackage = select.value;

popup.style.display='flex';

});

});

/* =====================
   CLOSE
===================== */

closePopup.addEventListener('click', ()=>{

popup.style.display='none';

});

/* =====================
   CONFIRM
===================== */

confirmBtn.addEventListener('click',

async ()=>{

const name =
document.getElementById('customerName').value;

const uid =
document.getElementById('gameUID').value;

if(!name || !uid){

alert('Nhập đầy đủ thông tin');

return;

}

const key =
'T2K-' +
Math.random()
.toString(36)
.substring(2,10)
.toUpperCase();

const orderID =
'#' +
Math.floor(Math.random()*999999);

const message = `
🛒 ĐƠN HÀNG MỚI

📦 Sản phẩm:
${currentTitle}

💎 Gói:
${currentPackage}

👤 Tên:
${name}

📱 Liên hệ:
${uid}

🔑 KEY:
${key}

🆔 ORDER:
${orderID}

🕒 TIME:
${new Date().toLocaleString()}
`;

try{

await fetch(
`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`,
{
method:'POST',

headers:{
'Content-Type':'application/json'
},

body:JSON.stringify({

chat_id:CHAT_ID,

text:message

})

}
);

alert(
'THUÊ THÀNH CÔNG\n\nKEY:\n' + key
);

popup.style.display='none';

}catch(err){

alert('Lỗi Telegram');

console.log(err);

}

});

</script>

</body>
</html>
